apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  # Health check: shows "Enabled" or "Disabled" as the health message
  # next to the Deployment in the ArgoCD resource tree, based on the
  # spec.desiredlifecycle label value.
  resource.customizations.health.apps_Deployment: |
    local hs = {}
    if obj.status == nil then
      hs.status = "Progressing"
      hs.message = "Waiting for deployment"
      return hs
    end
    if obj.status.conditions ~= nil then
      for _, condition in ipairs(obj.status.conditions) do
        if condition.type == "Progressing" and condition.reason == "ProgressDeadlineExceeded" then
          hs.status = "Degraded"
          hs.message = condition.message
          return hs
        end
      end
    end
    local desired   = obj.spec.replicas or 1
    local available = obj.status.availableReplicas or 0
    local lifecycle = ""
    if obj.spec.template.metadata ~= nil and obj.spec.template.metadata.labels ~= nil then
      local val = obj.spec.template.metadata.labels["spec.desiredlifecycle"]
      if val == "true" then
        lifecycle = "Enabled"
      elseif val == "false" then
        lifecycle = "Disabled"
      end
    end
    if available >= desired then
      hs.status = "Healthy"
      hs.message = lifecycle
    else
      hs.status = "Progressing"
      hs.message = "Waiting for replicas (" .. tostring(available) .. "/" .. tostring(desired) .. ")"
                   .. (lifecycle ~= "" and " · " .. lifecycle or "")
    end
    return hs

  # Context-aware actions: shows "enable" when lifecycle=false,
  # shows "disable" when lifecycle=true. Each directly patches the label.
  resource.customizations.actions.apps_Deployment: |
    discovery.lua: |
      local actions = {}
      local labels = obj.spec.template.metadata and obj.spec.template.metadata.labels
      if labels ~= nil then
        if labels["spec.desiredlifecycle"] == "true" then
          actions["disable"] = {["disabled"] = false}
        else
          actions["enable"] = {["disabled"] = false}
        end
      end
      return actions
    definitions:
    - name: enable
      action.lua: |
        obj.spec.template.metadata.labels["spec.desiredlifecycle"] = "true"
        return obj
    - name: disable
      action.lua: |
        obj.spec.template.metadata.labels["spec.desiredlifecycle"] = "false"
        return obj
