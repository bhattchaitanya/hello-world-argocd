apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-world-html
  namespace: hello-world
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Hello World – ArgoCD Demo</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          color: white;
        }
        .card {
          text-align: center;
          padding: 3rem 4rem;
          background: rgba(255,255,255,0.08);
          border-radius: 16px;
          backdrop-filter: blur(12px);
          border: 1px solid rgba(255,255,255,0.15);
          box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .emoji { font-size: 4rem; margin-bottom: 1rem; }
        h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        p { font-size: 1.1rem; opacity: 0.75; margin-bottom: 1.5rem; }
        .badge {
          display: inline-block;
          background: #e25c5c;
          color: white;
          padding: 0.3rem 1rem;
          border-radius: 999px;
          font-size: 0.85rem;
          font-weight: 600;
          letter-spacing: 0.05em;
        }
        .badge.argo { background: #f06623; }
        .badges { display: flex; gap: 0.75rem; justify-content: center; }
      </style>
    </head>
    <body>
      <div class="card">
        <div class="emoji">🚀</div>
        <h1>Hello, World!</h1>
        <p>Deployed via <strong>ArgoCD</strong> on a local <strong>kind</strong> cluster</p>
        <div class="badges">
          <span class="badge">Kubernetes</span>
          <span class="badge argo">ArgoCD GitOps</span>
        </div>
      </div>
    </body>
    </html>
